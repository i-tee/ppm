# docker-compose.yml
services:
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: ${PROJECT_NAME:-laravel}_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www

  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-laravel}_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend

  node:
    build:
      context: .
      dockerfile: ./docker/nodejs/Dockerfile
    container_name: ${PROJECT_NAME:-laravel}_node
    restart: unless-stopped
    ports:
      - "${VITE_PORT:-5173}:5173"
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node_modules:/var/www/node_modules
    command: npm run dev:local

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME:-laravel}_mailpit
    restart: unless-stopped
    ports:
      # Host-порты 1026/8026, чтобы не конфликтовать с mailpit основного
      # бэкенда (avicenna-backend) на 1025/8025, когда оба стека подняты.
      # Внутри контейнера — 1025/8025 без изменений: Laravel шлёт на
      # mailpit:1025 по имени сервиса (см. MAIL_HOST=mailpit), веб-UI — :8026.
      - "1026:1025"   # SMTP: host 1026 → контейнер 1025
      - "8026:8025"   # Веб-интерфейс Mailpit: host 8026 → контейнер 8025
    volumes:
      - mailpit-data:/data   # чтобы база с письмами сохранялась при перезапуске
    # networks не нужно указывать — автоматически попадёт в дефолтную сеть compose

volumes:
  dbdata:
  node_modules:
  mailpit-data: